<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 28 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 13 Q5 4 14 5 Q23 4 26 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M9 13 L14 17 M19 13 L14 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        forecaster
      </div>
      <div class="header-right">
        <span class="updated-label" id="updated-label"></span>
        <button class="icon-btn" id="refresh-btn" title="Refresh forecasts" aria-label="Refresh">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 10A7 7 0 1 1 10 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <polyline points="10,3 14,3 14,7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="controls-bar">
    <div class="controls-inner">
      <div class="control-group">
        <span class="control-label">Forecast</span>
        <span class="forecast-range">7 days</span>
      </div>
      <div class="control-group">
        <span class="control-label">Sort</span>
        <div class="sort-control" id="sort-control">
          <button class="sort-btn active" data-sort="flyability">Flyability</button>
          <button class="sort-btn" data-sort="alpha">A–Z</button>
        </div>
      </div>
      <button class="thresholds-toggle" id="thresholds-toggle" aria-expanded="false">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M9 1v3M9 14v3M1 9h3M14 9h3M3.1 3.1l2.1 2.1M12.8 12.8l2.1 2.1M3.1 14.9l2.1-2.1M12.8 5.2l2.1-2.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Thresholds
      </button>
      </div>
    </div>
  </div>

  <div class="thresholds-panel" id="thresholds-panel" hidden>
    <div class="thresholds-inner">
      <div class="threshold-item">
        <label class="threshold-label" for="rain-input">
          <svg viewBox="0 0 16 18" fill="none"><path d="M8 2 C8 2 2 9 2 12 a6 6 0 0 0 12 0 C14 9 8 2 8 2Z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
          Rain ≤
        </label>
        <input class="threshold-input" id="rain-input" type="number" min="0" max="100" value="30" />
        <span class="threshold-unit">%</span>
      </div>
      <div class="threshold-item">
        <label class="threshold-label" for="cloud-input">
          <svg viewBox="0 0 18 14" fill="none"><path d="M14 11a4 4 0 0 0-1-7.8A5 5 0 1 0 3 11Z" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
          Cloud ≤
        </label>
        <input class="threshold-input" id="cloud-input" type="number" min="0" max="100" value="75" />
        <span class="threshold-unit">%</span>
      </div>
      <span class="threshold-note">Max gusts fixed at 25 km/h</span>
    </div>
  </div>

  <main>
    <div class="main-inner">
      <div id="best-bet-container"></div>
      <div id="site-grid" class="site-grid">
        <div class="loading-state" id="loading-state">
          <div class="spinner"></div>
          <span>Fetching forecasts…</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span id="model-name"></span> via <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> · forecasts served via Go backend
    </div>
  </footer>

  <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
